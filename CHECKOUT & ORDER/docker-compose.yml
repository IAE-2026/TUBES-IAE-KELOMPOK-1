services:
  checkout-order-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkout-order-app
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: checkout-order-db
      DB_PORT: 3306
      DB_DATABASE: checkout_order_service
      DB_USERNAME: checkout_user
      DB_PASSWORD: checkout_password
    depends_on:
      checkout-order-db:
        condition: service_healthy
    networks:
      - iae-network

  checkout-order-db:
    image: mysql:8.4
    container_name: checkout-order-db
    restart: unless-stopped
    ports:
      - "33062:3306"
    environment:
      MYSQL_DATABASE: checkout_order_service
      MYSQL_USER: checkout_user
      MYSQL_PASSWORD: checkout_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - checkout-order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iae-network

volumes:
  checkout-order-db-data:

networks:
  iae-network:
    name: iae-network
    driver: bridge
