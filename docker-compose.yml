# =============================================================================
# TUBES IAE KELOMPOK 1 - DOCKER COMPOSE GABUNGAN
# E-Commerce: Proses Bisnis Pembelian Barang
# =============================================================================
# Cara pakai:
#   docker compose up -d --build
#   Tunggu semua container sehat, lalu akses lewat: http://localhost
# =============================================================================

services:

  # =========================================================================
  # API GATEWAY (Nginx) - Pintu masuk utama semua service
  # Semua request masuk melalui port 80, di-route ke service yang sesuai
  # =========================================================================
  gateway:
    image: nginx:alpine
    container_name: iae-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - produk-stok-app
      - cart-promo-app
      - checkout-order-app
      - customer-review-app
    networks:
      - iae-network

  # =========================================================================
  # SERVICE A: PRODUK & STOK (Dappa/Asep)
  # Port internal: 8000 | DB: produk-stok-db:3306
  # Endpoint: /api/v1/products/...
  # =========================================================================
  produk-stok-app:
    build:
      context: ./PRODUK & STOK
      dockerfile: Dockerfile
    container_name: produk-stok-app
    restart: unless-stopped
    expose:
      - "8000"
    working_dir: /app
    volumes:
      - ./PRODUK & STOK:/app
      - produk-stok-vendor:/app/vendor
    command: >
      sh -c "php artisan migrate --force 2>/dev/null; php artisan db:seed --force 2>/dev/null; php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_KEY: base64:randomkeyproduktokgenerateaja123=
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: produk-stok-db
      DB_PORT: 3306
      DB_DATABASE: produk_stok_service
      DB_USERNAME: root
      DB_PASSWORD: root123
      IAE_API_KEY: KEY-MHS-282
      IAE_NIM: 102022400191
    depends_on:
      produk-stok-db:
        condition: service_healthy
    networks:
      - iae-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  produk-stok-db:
    image: mysql:8.0
    container_name: produk-stok-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: produk_stok_service
    volumes:
      - produk-stok-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iae-network

  # =========================================================================
  # SERVICE B: CHECKOUT & ORDER (Lutfi)
  # Port internal: 8000 | DB: checkout-order-db:3306
  # Endpoint: /api/v1/checkouts/..., /api/v1/payments/..., /api/v1/orders/...
  # =========================================================================
  checkout-order-app:
    build:
      context: ./CHECKOUT & ORDER
      dockerfile: Dockerfile
    container_name: checkout-order-app
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      APP_KEY: base64:randomkeycheckoutordergenerateaja=
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: checkout-order-db
      DB_PORT: 3306
      DB_DATABASE: checkout_order_service
      DB_USERNAME: checkout_user
      DB_PASSWORD: checkout_password
      IAE_API_KEY: KEY-MHS-343
      IAE_NIM: 102022400268
    depends_on:
      checkout-order-db:
        condition: service_healthy
    volumes:
      - ./CHECKOUT & ORDER:/var/www/html
      - checkout-order-vendor:/var/www/html/vendor
    networks:
      - iae-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  checkout-order-db:
    image: mysql:8.4
    container_name: checkout-order-db
    restart: always
    environment:
      MYSQL_DATABASE: checkout_order_service
      MYSQL_USER: checkout_user
      MYSQL_PASSWORD: checkout_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - checkout-order-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iae-network

  # =========================================================================
  # SERVICE C: KERANJANG & PROMO (Naufan/Ipan)
  # Port internal: 8000 | DB: cart-promo-db:3306
  # Endpoint: /api/v1/carts/..., /api/v1/promo/...
  # =========================================================================
  cart-promo-app:
    build:
      context: ./CART PROMO
      dockerfile: Dockerfile
    container_name: cart-promo-app
    restart: unless-stopped
    expose:
      - "8000"
    working_dir: /app
    volumes:
      - ./CART PROMO:/app
      - cart-promo-vendor:/app/vendor
    command: >
      sh -c "php artisan migrate --force 2>/dev/null; php artisan db:seed --force 2>/dev/null; php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_KEY: base64:yuuW2SPo9FeD9YzQxROxzXcIfP7nEuk+yQPoQwYZpac=
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: cart-promo-db
      DB_PORT: 3306
      DB_DATABASE: cart_promo_service_db
      DB_USERNAME: root
      DB_PASSWORD: root
      IAE_API_KEY: KEY-MHS-376
      IAE_NIM: 102022400283
      SSO_BASE_URL: https://iae-sso.virtualfri.id
      SSO_EMAIL: warga13@ktp.iae.id
      SSO_PASSWORD: KtpDigital2026!
      SOAP_AUDIT_URL: https://iae-sso.virtualfri.id/soap/v1/audit
      RABBITMQ_PUBLISH_URL: https://iae-sso.virtualfri.id/api/v1/messages/publish
      TEAM_ID: TEAM-28
    depends_on:
      cart-promo-db:
        condition: service_healthy
    networks:
      - iae-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  cart-promo-db:
    image: mysql:8.0
    container_name: cart-promo-db
    restart: always
    environment:
      MYSQL_DATABASE: cart_promo_service_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - cart-promo-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iae-network

  # =========================================================================
  # SERVICE D: CUSTOMER REVIEW (Jara)
  # Port internal: 80 (Apache) | DB: SQLite (embedded)
  # Endpoint: /api/v1/reviews/...
  # =========================================================================
  customer-review-app:
    build:
      context: ./CUSTOMER-REVIEW
      dockerfile: Dockerfile
    container_name: customer-review-app
    restart: unless-stopped
    expose:
      - "80"
    environment:
      APP_KEY: base64:wdHbcRloV42SuQyYbiRHfmOPkoV4tMuHeoFUZanSE2o=
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: sqlite
      API_KEY: KEY-MHS-124
      IAE_API_KEY: KEY-MHS-124
      SSO_EMAIL: warga22@ktp.iae.id
      SSO_PASSWORD: KtpDigital2026!
      IAE_TEAM_ID: TEAM-01
      IAE_NIM: 102022400054
    volumes:
      - ./CUSTOMER-REVIEW:/var/www/html
    networks:
      - iae-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

# =============================================================================
# VOLUMES - Data persisten database
# =============================================================================
volumes:
  produk-stok-vendor:
  produk-stok-db-data:
  checkout-order-db-data:
  checkout-order-vendor:
  cart-promo-vendor:
  cart-promo-db-data:

# =============================================================================
# NETWORK - Semua service dalam satu jaringan internal
# =============================================================================
networks:
  iae-network:
    name: iae-network
    driver: bridge
