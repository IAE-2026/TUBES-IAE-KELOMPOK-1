server {
    listen 80;
    server_name localhost;

    # Service A: Produk & Stok (Dappa/Asep)
    # Rute ke produk, stok, dsb
    location ~ ^/api/v1/(products|sso/me|sso/products|graphql) {
        proxy_pass http://produk-stok-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service B: Checkout & Order (Lutfi)
    # Rute ke checkout, payment, orders
    location ~ ^/api/v1/(checkouts|payments|payment/methods|orders) {
        proxy_pass http://checkout-order-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service C: Keranjang & Promo (Naufan/Ipan)
    # Rute ke carts dan promos
    location ~ ^/api/v1/(carts|promos) {
        proxy_pass http://cart-promo-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service D: Customer Review (Jara)
    # Rute ke reviews
    location ~ ^/api/v1/reviews {
        proxy_pass http://customer-review-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback/Default
    location / {
        return 404 '{"error": "Service Not Found", "message": "Endpoint is not registered in the Gateway"}';
        default_type application/json;
    }
}
