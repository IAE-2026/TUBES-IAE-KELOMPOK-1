services:
  app:
    build: .
    container_name: produk-stok-service
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mysql
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: produk_stok_service
      DB_USERNAME: root
      DB_PASSWORD: root123

  mysql:
    image: mysql:8.0
    container_name: produk-stok-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: produk_stok_service
    ports:
      - "3308:3306"